<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>ERV Pricing Tool v2</title>
  <style>
    .header-container {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background-color: #f5f5f5;
      border-bottom: 2px solid #ccc;
    }

    .dashboard-link {
      color: #0066cc;
      text-decoration: none;
      font-weight: 600;
    }

    .title {
      flex: 1;
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
    }

    .top-row {
      display: flex;
      gap: 12px;
      padding: 12px;
    }

    .bottom-row {
      display: flex;
      gap: 12px;
      padding: 12px;
    }
  </style>
  <script type="module" src="databaseconfig.js"></script>
</head>

<body>
  <div class="header-container">
    <a class="dashboard-link" href="dashboard.html">← Dashboard</a>
    <div class="title">ERV Pricing Tool v2</div>
  </div>

  <div class="top-row">
    <iframe id="inputFrame" src="./input.html" height="1100" width="420" style="border:none;" scrolling="no"></iframe>
    <iframe id="boqFrame" src="./boq.html" height="1100" style="border:none; flex:1;" scrolling="yes"></iframe>
  </div>

  <div class="bottom-row">
    <iframe id="matrix1Frame" src="./matrix1.html" height="800" style="border:none; flex:1;" scrolling="yes"></iframe>
    <iframe id="matrix2Frame" src="./matrix2.html" height="800" style="border:none; flex:1;" scrolling="yes"></iframe>
  </div>

</body>

<script>




  // Wait for both iframes to load, then start sending values
  let inputFrame = document.querySelector('iframe[src="./input.html"]');
  let matrix1Frame = document.getElementById("matrix1Frame");
  let matrix2Frame = document.getElementById("matrix2Frame");
  let boqFrame = document.getElementById("boqFrame");

  const framesReady = { input: false, matrix: false, boq: false };

  function tryStartInterval() {
    // if (framesReady.input && framesReady.matrix && framesReady.boq) {
    //   setInterval(sendInputsToMatrix, 100); // simple live update
    // }
  }

  inputFrame.addEventListener('load', function () {
    framesReady.input = true;
    tryStartInterval();
  });

  matrix1Frame.addEventListener('load', function () {
    framesReady.matrix = true;
    tryStartInterval();
  });

  boqFrame.addEventListener('load', function () {
    framesReady.boq = true;
    tryStartInterval();
  });

  matrix2Frame.addEventListener("load", function () {
    setTimeout(fitPageToViewport, 50);
  });



  //loadproject();
  async function loadproject() {
    const projectId = new URLSearchParams(window.location.search).get("id");
    const { data, error } = await supabase
      .from("projects")
      .select("project_name, project_data")
      .eq("id", projectId)
      .single();

    //   document.getElementById("projectId").textContent = projectId;
    //   document.getElementById("projectName").textContent = data.project_name;
    document.getElementById("inputFrame").src = `./input.html?id=${projectId}`;


  }

  document.addEventListener("DOMContentLoaded", loadproject);

  const frames = [...document.querySelectorAll("iframe")]
    .reduce((m, f) => (m[f.id] = f.contentWindow, m), {});

  window.addEventListener("message", e => {
    const { to, value } = e.data || {};
    frames[to]?.postMessage({ value }, "*");
  });

</script>





</body>

</html>
