    function populatepreheater(series) {
      const preheater = document.getElementById("preheater");

      const previousValue = preheater.value; // save selection

      // Clear dropdown
      preheater.innerHTML = "";

      // Add options for selected series
      preheaters[series].forEach(item => {
        const opt = document.createElement("option");
        opt.value = item.value;
        opt.text = item.text;
        opt.setAttribute("datacapacity", item.datacapacity); // store capacity as data attribute
        preheater.add(opt);
      });

      // ✅ Restore previous value if it still exists
      const valueStillExists = preheaters[series].some(
        item => item.value === previousValue
      );

      if (valueStillExists) {
        preheater.value = previousValue;
      } else {
        preheater.selectedIndex = 0; // fallback to first option
      }
    }

      } else {
        postheater.selectedIndex = 0; // fallback to first option
      }
    }

      // Add options
      opts.forEach(item => {
        const opt = document.createElement("option");
        opt.value = item.value;
        opt.text = item.text;
        defrostbypassSelect.add(opt);
      });

      // ✅ Restore previous value if still valid
      const valueStillExists = opts.some(o => o.value === previousValue);

      if (valueStillExists) {
        defrostbypassSelect.value = previousValue;
      } else {
        defrostbypassSelect.value = "182-X"; // default to None
      }

      updatedefrostbypass();
    }

    function outputdata() {
      dvoltageVal = voltage.options[voltage.selectedIndex].getAttribute("data-voltage");
      d90Phase = voltage.options[voltage.selectedIndex].getAttribute("data-phase");
      e90phasecode = "90-" + d90Phase;
      d89AmpFactor = Math.sqrt(d90Phase).toFixed(2); // example amp factor calculation based on phase 
      d88PreheatkW = preheater.options[preheater.selectedIndex].getAttribute("datacapacity");
      d87PostheatkW = postheater.options[postheater.selectedIndex].getAttribute("datacapacity");

        d85FanFLA = "";
        d84TotalFanFLA = "";
        return;
      }
      d85FanFLA = fanflas[e123modelcode][voltage.value].FLA;
      d84TotalFanFLA = fanflas[e123modelcode][voltage.value].TOTALFLA;
      d83ControlsFLA = (Math.ceil((d86ControlsW / dvoltageVal) / 0.1) * 0.1).toFixed(1);
      if (preheater.value !== "25-N" || postheater.value !== "26-N") {
        d82FansNCtrlsMCACont = (1.25 * d84TotalFanFLA + 1.25 * d83ControlsFLA).toFixed(2);
      }
      if (preheater.value === "25-N" && postheater.value === "26-N") {
        d82FansNCtrlsMCACont = (d84TotalFanFLA + 0.25 * d85FanFLA).toFixed(2);
      }
      d81PreheatFLA = (d88PreheatkW * 1000 / dvoltageVal / d89AmpFactor).toFixed(2);
      d80PostheatFLA = (d87PostheatkW * 1000 / dvoltageVal / d89AmpFactor).toFixed(2);
      d79FLA = (parseFloat(d84TotalFanFLA) + parseFloat(d83ControlsFLA) + parseFloat(d81PreheatFLA) + parseFloat(d80PostheatFLA)).toFixed(2);

      }

    function xlookupMatchMinus1(lookupValue, lookupArray, returnArray) {//exact match or next smaller
      let result = null;
      for (let i = 0; i < lookupArray.length; i++) {
        if (lookupArray[i] === lookupValue) {
          return returnArray[i]; // exact match
        }
        if (lookupArray[i] > lookupValue) {
          return result; // previous (next smaller)
        }
        result = returnArray[i];
      }
      return result; // last value if lookupValue is bigger than all
    }

    function xlookupMatch1(lookupValue, lookupArray, returnArray) {//exact match or next larger
      for (let i = 0; i < lookupArray.length; i++) {

        if (lookupArray[i] === lookupValue) {
          return returnArray[i]; // exact match
        }

        if (lookupArray[i] > lookupValue) {
          return returnArray[i]; // next larger
        }
      }

      return null; // nothing larger found
    }
