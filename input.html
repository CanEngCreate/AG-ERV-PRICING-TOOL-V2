    function updateseries() {
      e123modelcode = series.value;
      document.getElementById("seriescode").textContent = e123modelcode;
      m123model = e123modelcode.split("-")[1];
      m1series = m123model.charAt(0);
      m2cores = m123model.charAt(1);
      m3cores = m123model.charAt(2);
      d71numberofcores = Number(m2cores + m3cores);
      //document.getElementById("testcode").textContent = matrixval1 + matrixval2 + matrixval3;

      populatepreheater(e123modelcode);
      populatepostheater(e123modelcode);
      updateenclosuretype()
    }

    function updatelocation() {
      e4locationcode = ervlocation.value;
      document.getElementById("ervlocationcode").textContent = e4locationcode;
      updatebaserail();
      m4location = e4locationcode.split("-")[1];
    }

    function updatebaserail() {
      let baseraillabelcolor = "black";
      let baserailcode = "22-X";
      if (e4locationcode == "4-X") {
        baseraillabelcolor = "gray";
        baserail.checked = false;
        baserail.disabled = true;
        baserailcode = "22-X";
        e92enclosurebasecode = "92-X";
      }
      if (e4locationcode == "4-i") {
        baseraillabelcolor = "black";
        baserail.disabled = false; // optional
        baserailcode = baserail.checked ? "22-H" : "22-X"
        e92enclosurebasecode = baserail.checked ? "92-Y" : "92-N"
      }
      if (e4locationcode == "4-R") {
        baseraillabelcolor = "gray";
        baserail.checked = true;
        baserail.disabled = true; // locked-true
        baserailcode = "22-X";
        e92enclosurebasecode = "92-Y"
      }
      document.getElementById("baseraillabel").style.color = baseraillabelcolor;
      document.getElementById("baserailcode").textContent = baserailcode;
      m22optionbaserailindoorunit = baserailcode.split("-")[1];

    function outputdata() {
      dvoltageVal = voltage.options[voltage.selectedIndex].getAttribute("data-voltage");
      d90Phase = voltage.options[voltage.selectedIndex].getAttribute("data-phase");
      e90phasecode = "90-" + d90Phase;
      d89AmpFactor = Math.sqrt(d90Phase).toFixed(2); // example amp factor calculation based on phase 
      d88PreheatkW = preheater.options[preheater.selectedIndex].getAttribute("datacapacity");
      d87PostheatkW = postheater.options[postheater.selectedIndex].getAttribute("datacapacity");
      if (e123modelcode === "123-XXX" || voltage.value === "8-X") {
        d85FanFLA = "";
        d84TotalFanFLA = "";
        return;
      }
      d85FanFLA = fanflas[e123modelcode][voltage.value].FLA;
      d84TotalFanFLA = fanflas[e123modelcode][voltage.value].TOTALFLA;
      d83ControlsFLA = (Math.ceil((d86ControlsW / dvoltageVal) / 0.1) * 0.1).toFixed(1);
      if (preheater.value !== "25-N" || postheater.value !== "26-N") {
        d82FansNCtrlsMCACont = (1.25 * d84TotalFanFLA + 1.25 * d83ControlsFLA).toFixed(2);
      }
      if (preheater.value === "25-N" && postheater.value === "26-N") {
        d82FansNCtrlsMCACont = (d84TotalFanFLA + 0.25 * d85FanFLA).toFixed(2);
      }
      d81PreheatFLA = (d88PreheatkW * 1000 / dvoltageVal / d89AmpFactor).toFixed(2);
      d80PostheatFLA = (d87PostheatkW * 1000 / dvoltageVal / d89AmpFactor).toFixed(2);
      d79FLA = (parseFloat(d84TotalFanFLA) + parseFloat(d83ControlsFLA) + parseFloat(d81PreheatFLA) + parseFloat(d80PostheatFLA)).toFixed(2);
      d78MinMainDiscSize = Number((1.16 * d79FLA).toFixed(2));
      d77MCA = Number((parseFloat(d82FansNCtrlsMCACont) + 1.25 * parseFloat(d81PreheatFLA) + 1.25 * parseFloat(d80PostheatFLA)).toFixed(2));
      d76MOPUnrounded = (1.25 * d85FanFLA + parseFloat(d84TotalFanFLA) + parseFloat(d83ControlsFLA) + parseFloat(d81PreheatFLA) + parseFloat(d80PostheatFLA)).toFixed(2);
      d75MOPFuseSizeDown = Math.max(xlookupMatchMinus1(d76MOPUnrounded, standardfusesizes, standardfusesizes), 15);
      if (parseFloat(d76MOPUnrounded) < 15) {
        d75MOPFuseSizeDown = 15;
      }
      d74MCAFuseSizeUp = xlookupMatch1(d77MCA, standardfusesizes, standardfusesizes);
      if (d75MOPFuseSizeDown < d77MCA) {
        d73MOP = d74MCAFuseSizeUp;
      } else {
        d73MOP = d75MOPFuseSizeDown;
      }

      d70minmaindisconnectrange = calculatedisORmoprange(d78MinMainDiscSize);
      e70disconnectrangecode = "70-" + d70minmaindisconnectrange;
      d69moprange = calculatedisORmoprange(d73MOP);
      e69moprangecode = "69-" + d69moprange;


      if (m25coilspreheat[0] == "B") {
        d66preheater = "Y";
      } else {
        d66preheater = "N";
      }
      e66preheatercode = "66-" + d66preheater;
      let dxxpostheater = "N";
      if (m26coilspostheat[0] == "B") {
        dxxpostheater = "Y";
      } else {
        dxxpostheater = "N";
      }

      if (d77MCA > 100) {
        d68powerdistributioncriteria = "E";
      }
      else if (d66preheater === "Y" && dxxpostheater === "Y") {
        d68powerdistributioncriteria = "D";
      }
      else if (d66preheater === "Y" || dxxpostheater === "Y") {
        d68powerdistributioncriteria = "C";
      }
      else if (m17optiondisconnect === "A" || m17optiondisconnect === "B") {
        d68powerdistributioncriteria = "B";
      }
      else if (m17optiondisconnect === "N") {
        d68powerdistributioncriteria = "A";
      }
      e68powerdistributioncriteriacode = "68-" + d68powerdistributioncriteria;


    }


    function calculatedisORmoprange(dismopvalue) {
      if (dismopvalue >= 0 && dismopvalue <= 30) {
        return "A";
      } else if (dismopvalue > 30 && dismopvalue <= 60) {
        return "B";
      } else if (dismopvalue > 60 && dismopvalue <= 100) {
        return "C";
      } else if (dismopvalue > 100 && dismopvalue <= 200) {
        return "D";
      } else if (dismopvalue > 200) {
        return "E";
      }
    }

    }



    function xlookupMatchMinus1(lookupValue, lookupArray, returnArray) {//exact match or next smaller
      let result = null;
      for (let i = 0; i < lookupArray.length; i++) {
        if (lookupArray[i] === lookupValue) {
          return returnArray[i]; // exact match
        }
        if (lookupArray[i] > lookupValue) {
          return result; // previous (next smaller)
        }
        result = returnArray[i];
      }
      return result; // last value if lookupValue is bigger than all
    }

    function xlookupMatch1(lookupValue, lookupArray, returnArray) {//exact match or next larger
      for (let i = 0; i < lookupArray.length; i++) {

        if (lookupArray[i] === lookupValue) {
          return returnArray[i]; // exact match
        }

        if (lookupArray[i] > lookupValue) {
          return returnArray[i]; // next larger
        }
      }

      return null; // nothing larger found
    }
